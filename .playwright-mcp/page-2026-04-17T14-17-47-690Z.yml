          - paragraph [ref=e230]:
            - text: Computer vision tasks include methods for
            - link "acquiring" [ref=e231] [cursor=pointer]:
              - /url: /wiki/Image_sensor
            - text: ","
            - link "processing" [ref=e232] [cursor=pointer]:
              - /url: /wiki/Image_processing
            - text: ","
            - link "analyzing" [ref=e233] [cursor=pointer]:
              - /url: /wiki/Image_analysis
            - text: ", and understanding"
            - link "digital images" [ref=e234] [cursor=pointer]:
              - /url: /wiki/Digital_image
            - text: ", and extraction of"
            - link "high-dimensional" [ref=e235] [cursor=pointer]:
              - /url: /wiki/High-dimensional
            - text: data from the real world in order to produce numerical or symbolic information, e.g. in the form of decisions.
            - superscript [ref=e236]:
              - link "[1]" [ref=e237] [cursor=pointer]:
                - /url: "#cite_note-Klette-2014-1"
            - superscript [ref=e238]:
              - link "[2]" [ref=e239] [cursor=pointer]:
                - /url: "#cite_note-Shapiro-Stockman-2001-2"
            - superscript [ref=e240]:
              - link "[3]" [ref=e241] [cursor=pointer]:
                - /url: "#cite_note-Morris-2004-3"
            - superscript [ref=e242]:
              - link "[4]" [ref=e243] [cursor=pointer]:
                - /url: "#cite_note-Jahne-Haussecker-2000-4"
            - text: "\"Understanding\" in this context signifies the transformation of visual images into descriptions of the world that make sense to thought processes and can elicit appropriate action. This image understanding can be seen as the disentangling of symbolic information from image data using models constructed with the aid of"
            - link "geometry" [ref=e244] [cursor=pointer]:
              - /url: /wiki/Geometry
            - text: ","
            - link "physics" [ref=e245] [cursor=pointer]:
              - /url: /wiki/Physics
            - text: ","
            - link "statistics" [ref=e246] [cursor=pointer]:
              - /url: /wiki/Statistics
            - text: ", and learning theory."
          - paragraph [ref=e247]:
            - text: The
            - link "scientific discipline" [ref=e248] [cursor=pointer]:
              - /url: /wiki/Scientific_discipline
            - text: of computer vision is concerned with the theory behind artificial systems that extract information from images. Image data can take many forms, such as video sequences, views from multiple cameras, multi-dimensional data from a
            - link "3D scanner" [ref=e249] [cursor=pointer]:
              - /url: /wiki/3D_scanning
            - text: ", 3D point clouds from"
            - link "LiDaR" [ref=e250] [cursor=pointer]:
              - /url: /wiki/Lidar
            - text: sensors, or medical scanning devices. The technological discipline of computer vision seeks to apply its theories and models to the construction of computer vision systems.
          - paragraph [ref=e251]:
            - text: Subdisciplines of computer vision include
            - link "scene reconstruction" [ref=e252] [cursor=pointer]:
              - /url: /wiki/3D_reconstruction
            - text: ","
            - link "object detection" [ref=e253] [cursor=pointer]:
              - /url: /wiki/Object_detection
            - text: ","
            - link "event detection" [ref=e254] [cursor=pointer]:
              - /url: /wiki/Event_detection
            - text: ","
            - link "activity recognition" [ref=e255] [cursor=pointer]:
              - /url: /wiki/Activity_recognition
            - text: ","
            - link "video tracking" [ref=e256] [cursor=pointer]:
              - /url: /wiki/Video_tracking
            - text: ","
            - link "object recognition" [ref=e257] [cursor=pointer]:
              - /url: /wiki/Object_recognition
            - text: ","
            - link "3D pose estimation" [ref=e258] [cursor=pointer]:
              - /url: /wiki/3D_pose_estimation
            - text: ", learning, indexing,"
            - link "motion estimation" [ref=e259] [cursor=pointer]:
              - /url: /wiki/Motion_estimation
            - text: ","
            - link "visual servoing" [ref=e260] [cursor=pointer]:
              - /url: /wiki/Visual_servoing
            - text: ","
            - link "3D scene modeling" [ref=e261] [cursor=pointer]:
              - /url: /wiki/3D_modeling
            - text: ", and"
            - link "image restoration" [ref=e262] [cursor=pointer]:
              - /url: /wiki/Digital_photograph_restoration
            - text: .
          - generic [ref=e263]:
            - heading "Definition" [level=2] [ref=e264]
            - generic [ref=e265]:
              - text: "["
              - link "edit" [ref=e266] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=1
              - text: "]"
          - paragraph [ref=e267]:
            - text: Computer vision is an
            - link "interdisciplinary field" [ref=e268] [cursor=pointer]:
              - /url: /wiki/Interdisciplinarity
            - text: that deals with how computers can be made to gain high-level understanding from
            - link "digital images" [ref=e269] [cursor=pointer]:
              - /url: /wiki/Digital_image
            - text: or
            - link "videos" [ref=e270] [cursor=pointer]:
              - /url: /wiki/Video
            - text: . From the perspective of
            - link "engineering" [ref=e271] [cursor=pointer]:
              - /url: /wiki/Engineering
            - text: ", it seeks to automate tasks that the"
            - link "human visual system" [ref=e272] [cursor=pointer]:
              - /url: /wiki/Human_visual_system
            - text: can do.
            - superscript [ref=e273]:
              - link "[5]" [ref=e274] [cursor=pointer]:
                - /url: "#cite_note-Ballard-Brown-1982-5"
            - superscript [ref=e275]:
              - link "[6]" [ref=e276] [cursor=pointer]:
                - /url: "#cite_note-Huang-1996-6"
            - superscript [ref=e277]:
              - link "[7]" [ref=e278] [cursor=pointer]:
                - /url: "#cite_note-Sonka-Hlavac-Boyle-2008-7"
            - text: "\"Computer vision is concerned with the automatic extraction, analysis, and understanding of useful information from a single image or a sequence of images. It involves the development of a theoretical and algorithmic basis to achieve automatic visual understanding.\""
            - superscript [ref=e279]:
              - link "[8]" [ref=e280] [cursor=pointer]:
                - /url: "#cite_note-bmva-8"
            - text: As a
            - link "scientific discipline" [ref=e281] [cursor=pointer]:
              - /url: /wiki/Scientific_discipline
            - text: ", computer vision is concerned with the theory behind artificial systems that extract information from images. The image data can take many forms, such as video sequences, views from multiple cameras, or multi-dimensional data from a"
            - link "medical scanner" [ref=e282] [cursor=pointer]:
              - /url: /wiki/Medical_scanner
            - text: .
            - superscript [ref=e283]:
              - link "[9]" [ref=e284] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: As a technological discipline, computer vision seeks to apply its theories and models for the construction of computer vision systems.
            - link "Machine vision" [ref=e285] [cursor=pointer]:
              - /url: /wiki/Machine_vision
            - text: refers to a systems engineering discipline, especially in the context of factory automation. In more recent times, the terms computer vision and machine vision have converged to a greater degree.
            - superscript [ref=e286]:
              - link "[10]" [ref=e287] [cursor=pointer]:
                - /url: "#cite_note-davies5-10"
            - superscript [ref=e288]: ": 13"
          - generic [ref=e289]:
            - heading "History" [level=2] [ref=e290]
            - generic [ref=e291]:
              - text: "["
              - link "edit" [ref=e292] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=2
              - text: "]"
          - paragraph [ref=e293]:
            - text: In the late 1960s, computer vision began at universities that were pioneering
            - link "artificial intelligence" [ref=e294] [cursor=pointer]:
              - /url: /wiki/Artificial_intelligence
            - text: . It was meant to mimic the
            - link "human visual system" [ref=e295] [cursor=pointer]:
              - /url: /wiki/Human_visual_system
            - text: as a stepping stone to endowing robots with intelligent behavior.
            - superscript [ref=e296]:
              - link "[11]" [ref=e297] [cursor=pointer]:
                - /url: "#cite_note-Szeliski2010-11"
            - text: In 1966, it was believed that this could be achieved through an undergraduate summer project,
            - superscript [ref=e298]:
              - link "[12]" [ref=e299] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: by attaching a camera to a computer and having it "describe what it saw".
            - superscript [ref=e300]:
              - link "[13]" [ref=e301] [cursor=pointer]:
                - /url: "#cite_note-Seymour1966-13"
            - superscript [ref=e302]:
              - link "[14]" [ref=e303] [cursor=pointer]:
                - /url: "#cite_note-Boden2006-14"
          - paragraph [ref=e304]:
            - text: What distinguished computer vision from the prevalent field of
            - link "digital image processing" [ref=e305] [cursor=pointer]:
              - /url: /wiki/Digital_image_processing
            - text: at that time was a desire to extract
            - link "three-dimensional" [ref=e306] [cursor=pointer]:
              - /url: /wiki/Three-dimensional
            - text: structure from images with the goal of achieving full scene understanding. Studies in the 1970s formed the early foundations for many of the computer vision
            - link "algorithms" [ref=e307] [cursor=pointer]:
              - /url: /wiki/Algorithm
            - text: that exist today, including
            - link "extraction of edges" [ref=e308] [cursor=pointer]:
              - /url: /wiki/Edge_detection
            - text: from images, labeling of lines, non-polyhedral and
            - link "polyhedral modeling" [ref=e309] [cursor=pointer]:
              - /url: /wiki/Polyhedron_model
            - text: ", representation of objects as interconnections of smaller structures,"
            - link "optical flow" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Optical_flow
            - text: ", and"
            - link "motion estimation" [ref=e311] [cursor=pointer]:
              - /url: /wiki/Motion_estimation
            - text: .
            - superscript [ref=e312]:
              - link "[11]" [ref=e313] [cursor=pointer]:
                - /url: "#cite_note-Szeliski2010-11"
          - paragraph [ref=e314]:
            - text: The next decade saw studies based on more rigorous mathematical analysis and quantitative aspects of computer vision. These include the concept of
            - link "scale-space" [ref=e315] [cursor=pointer]:
              - /url: /wiki/Scale_space
            - text: ", the inference of shape from various cues such as"
            - link "shading" [ref=e316] [cursor=pointer]:
              - /url: /wiki/Shading
            - text: ", texture and focus, and"
            - link "contour models known as snakes" [ref=e317] [cursor=pointer]:
              - /url: /wiki/Active_contour_model
            - text: . Researchers also realized that many of these mathematical concepts could be treated within the same optimization framework as
            - link "regularization" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Regularization_(mathematics)
            - text: and
            - link "Markov random fields" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Markov_random_field
            - text: .
            - superscript [ref=e320]:
              - link "[15]" [ref=e321] [cursor=pointer]:
                - /url: "#cite_note-Kanade20122-15"
            - text: By the 1990s, some of the previous research topics became more active than others. Research in
            - link "projective" [ref=e322] [cursor=pointer]:
              - /url: /wiki/Projective_geometry
            - link "3-D reconstructions" [ref=e323] [cursor=pointer]:
              - /url: /wiki/3D_reconstruction
            - text: led to better understanding of
            - link "camera calibration" [ref=e324] [cursor=pointer]:
              - /url: /wiki/Camera_resectioning
            - text: . With the advent of optimization methods for camera calibration, it was realized that a lot of the ideas were already explored in
            - link "bundle adjustment" [ref=e325] [cursor=pointer]:
              - /url: /wiki/Bundle_adjustment
            - text: theory from the field of
            - link "photogrammetry" [ref=e326] [cursor=pointer]:
              - /url: /wiki/Photogrammetry
            - text: . This led to methods for sparse
            - link "3-D reconstructions of scenes from multiple images" [ref=e327] [cursor=pointer]:
              - /url: /wiki/3D_reconstruction_from_multiple_images
            - text: . Progress was made on the dense stereo
            - link "correspondence problem" [ref=e328] [cursor=pointer]:
              - /url: /wiki/Correspondence_problem
            - text: and further multi-view stereo techniques. At the same time,
            - link "variations of graph cut" [ref=e329] [cursor=pointer]:
              - /url: /wiki/Graph_cuts_in_computer_vision
            - text: were used to solve
            - link "image segmentation" [ref=e330] [cursor=pointer]:
              - /url: /wiki/Image_segmentation
            - text: . This decade also marked the first time statistical learning techniques were used in practice to recognize faces in images (see
            - link "Eigenface" [ref=e331] [cursor=pointer]:
              - /url: /wiki/Eigenface
            - text: ). Toward the end of the 1990s, a significant change came about with the increased interaction between the fields of
            - link "computer graphics" [ref=e332] [cursor=pointer]:
              - /url: /wiki/Computer_graphics_(computer_science)
            - text: and computer vision. This included
            - link "image-based rendering" [ref=e333] [cursor=pointer]:
              - /url: /wiki/Image-based_rendering
            - text: ","
            - link "image morphing" [ref=e334] [cursor=pointer]:
              - /url: /wiki/Morphing
            - text: ", view interpolation,"
            - link "panoramic image stitching" [ref=e335] [cursor=pointer]:
              - /url: /wiki/Image_stitching
            - text: and early
            - link "light-field rendering" [ref=e336] [cursor=pointer]:
              - /url: /wiki/Light_field
            - text: .
            - superscript [ref=e337]:
              - link "[11]" [ref=e338] [cursor=pointer]:
                - /url: "#cite_note-Szeliski2010-11"
          - paragraph [ref=e339]:
            - text: Recent work has seen the resurgence of
            - link "feature" [ref=e340] [cursor=pointer]:
              - /url: /wiki/Feature_(computer_vision)
            - text: "-based methods used in conjunction with machine learning techniques and complex optimization frameworks."
            - superscript [ref=e341]:
              - link "[16]" [ref=e342] [cursor=pointer]:
                - /url: "#cite_note-Sebe2005-16"
            - superscript [ref=e343]:
              - link "[17]" [ref=e344] [cursor=pointer]:
                - /url: "#cite_note-Freeman2008-17"
            - text: The advancement of
            - link "Deep Learning" [ref=e345] [cursor=pointer]:
              - /url: /wiki/Deep_learning
            - text: techniques has brought further life to the field of computer vision. The accuracy of deep learning algorithms on several benchmark computer vision data sets for tasks ranging from classification,
            - superscript [ref=e346]:
              - link "[18]" [ref=e347] [cursor=pointer]:
                - /url: "#cite_note-NatureBengio-18"
            - text: segmentation and optical flow has surpassed prior methods.
            - superscript [ref=e348]:
              - link "[19]" [ref=e349] [cursor=pointer]:
                - /url: "#cite_note-19"
            - superscript [ref=e350]:
              - link "[20]" [ref=e351] [cursor=pointer]:
                - /url: "#cite_note-20"
          - generic [ref=e352]:
            - heading "Related fields" [level=2] [ref=e353]
            - generic [ref=e354]:
              - text: "["
              - link "edit" [ref=e355] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=3
              - text: "]"
          - figure "Object detection in a photograph" [ref=e356]:
            - link [ref=e357] [cursor=pointer]:
              - /url: /wiki/File:Intersection_over_Union_-_object_detection_bounding_boxes.jpg
              - img [ref=e358]
            - generic [ref=e359]:
              - link "Object detection" [ref=e360] [cursor=pointer]:
                - /url: /wiki/Object_detection
              - text: in a photograph
          - generic [ref=e361]:
            - heading "Solid-state physics" [level=3] [ref=e362]
            - generic [ref=e363]:
              - text: "["
              - link "edit" [ref=e364] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=4
              - text: "]"
          - paragraph [ref=e365]:
            - link "Solid-state physics" [ref=e366] [cursor=pointer]:
              - /url: /wiki/Solid-state_physics
            - text: is another field that is closely related to computer vision. Most computer vision systems rely on
            - link "image sensors" [ref=e367] [cursor=pointer]:
              - /url: /wiki/Image_sensors
            - text: ", which detect"
            - link "electromagnetic radiation" [ref=e368] [cursor=pointer]:
              - /url: /wiki/Electromagnetic_radiation
            - text: ", which is typically in the form of either"
            - link "visible" [ref=e369] [cursor=pointer]:
              - /url: /wiki/Visible_light
            - text: ","
            - link "infrared" [ref=e370] [cursor=pointer]:
              - /url: /wiki/Infrared_light
            - text: or
            - link "ultraviolet light" [ref=e371] [cursor=pointer]:
              - /url: /wiki/Ultraviolet_light
            - text: . The sensors are designed using
            - link "quantum physics" [ref=e372] [cursor=pointer]:
              - /url: /wiki/Quantum_physics
            - text: . The process by which light interacts with surfaces is explained using physics. Physics explains the behavior of
            - link "optics" [ref=e373] [cursor=pointer]:
              - /url: /wiki/Optics
            - text: which are a core part of most imaging systems. Sophisticated image sensors even require
            - link "quantum mechanics" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Quantum_mechanics
            - text: to provide a complete understanding of the image formation process.
            - superscript [ref=e375]:
              - link "[11]" [ref=e376] [cursor=pointer]:
                - /url: "#cite_note-Szeliski2010-11"
            - text: Also, various measurement problems in physics can be addressed using computer vision, for example, motion in fluids.
          - generic [ref=e377]:
            - heading "Neurobiology" [level=3] [ref=e378]
            - generic [ref=e379]:
              - text: "["
              - link "edit" [ref=e380] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=5
              - text: "]"
          - generic [ref=e383]:
            - generic [ref=e384]:
              - link [ref=e387] [cursor=pointer]:
                - /url: /wiki/File:Simplified_neural_network_training_example.svg
                - img [ref=e388]
              - generic [ref=e389]:
                - text: "Simplified example of training a neural network in object detection: The network is trained by multiple images that are known to depict"
                - link "starfish" [ref=e390] [cursor=pointer]:
                  - /url: /wiki/Starfish
                - text: and
                - link "sea urchins" [ref=e391] [cursor=pointer]:
                  - /url: /wiki/Sea_urchin
                - text: ", which are correlated with \"nodes\" that represent visual"
                - link "features" [ref=e392] [cursor=pointer]:
                  - /url: /wiki/Feature_(computer_vision)
                - text: . The starfish match with a ringed texture and a star outline, whereas most sea urchins match with a striped texture and oval shape. However, the instance of a ring-textured sea urchin creates a weakly weighted association between them.
            - generic [ref=e393]:
              - link [ref=e396] [cursor=pointer]:
                - /url: /wiki/File:Simplified_neural_network_example.svg
                - img [ref=e397]
              - generic [ref=e398]:
                - text: "Subsequent run of the network on an input image (left):"
                - superscript [ref=e399]:
                  - link "[21]" [ref=e400] [cursor=pointer]:
                    - /url: "#cite_note-21"
                - text: The network correctly detects the starfish. However, the weakly weighted association between ringed texture and sea urchin also confers a weak signal to the latter from one of two intermediate nodes. In addition, a shell that was not included in the training gives a weak signal for the oval shape, also resulting in a weak signal for the sea urchin output. These weak signals may result in a
                - link "false positive" [ref=e401] [cursor=pointer]:
                  - /url: /wiki/False_positive
                - text: result for sea urchin.
                - text: In reality, textures and outlines would not be represented by single nodes, but rather by associated weight patterns of multiple nodes.
          - paragraph [ref=e402]:
            - link "Neurobiology" [ref=e403] [cursor=pointer]:
              - /url: /wiki/Neurobiology
            - text: has greatly influenced the development of computer vision algorithms. Over the last century, there has been an extensive study of eyes, neurons, and brain structures devoted to the processing of visual stimuli in both humans and various animals. This has led to a coarse yet convoluted description of how natural vision systems operate in order to solve certain vision-related tasks. These results have led to a sub-field within computer vision where artificial systems are designed to mimic the processing and behavior of biological systems at different levels of complexity. Also, some of the learning-based methods developed within computer vision (e.g.
            - link "neural net" [ref=e404] [cursor=pointer]:
              - /url: /wiki/Artificial_neural_network
            - text: and
            - link "deep learning" [ref=e405] [cursor=pointer]:
              - /url: /wiki/Deep_learning
            - text: based image and feature analysis and classification) have their background in neurobiology. The
            - link "Neocognitron" [ref=e406] [cursor=pointer]:
              - /url: /wiki/Neocognitron
            - text: ", a neural network developed in the 1970s by"
            - link "Kunihiko Fukushima" [ref=e407] [cursor=pointer]:
              - /url: /wiki/Kunihiko_Fukushima
            - text: ", is an early example of computer vision taking direct inspiration from neurobiology, specifically the"
            - link "primary visual cortex" [ref=e408] [cursor=pointer]:
              - /url: /wiki/Visual_cortex#Primary_visual_cortex_(V1)
            - text: .
          - paragraph [ref=e409]:
            - text: Some strands of computer vision research are closely related to the study of
            - link "biological vision" [ref=e410] [cursor=pointer]:
              - /url: /wiki/Biological_vision
            - text: —indeed, just as many strands of
            - link "AI" [ref=e411] [cursor=pointer]:
              - /url: /wiki/Artificial_intelligence
            - text: research are closely tied with research into human intelligence and the use of stored knowledge to interpret, integrate, and utilize visual information. The field of biological vision studies and models the physiological processes behind visual perception in humans and other animals. Computer vision, on the other hand, develops and describes the algorithms implemented in software and hardware behind artificial vision systems. An interdisciplinary exchange between biological and computer vision has proven fruitful for both fields.
            - superscript [ref=e412]:
              - link "[22]" [ref=e413] [cursor=pointer]:
                - /url: "#cite_note-TextbookP1-22"
          - generic [ref=e414]:
            - heading "Signal processing" [level=3] [ref=e415]
            - generic [ref=e416]:
              - text: "["
              - link "edit" [ref=e417] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=6
              - text: "]"
          - paragraph [ref=e418]:
            - text: Yet another field related to computer vision is
            - link "signal processing" [ref=e419] [cursor=pointer]:
              - /url: /wiki/Signal_processing
            - text: . Many methods for processing one-variable signals, typically temporal signals, can be extended in a natural way to the processing of two-variable signals or multi-variable signals in computer vision. However, because of the specific nature of images, there are many methods developed within computer vision that have no counterpart in the processing of one-variable signals. Together with the multi-dimensionality of the signal, this defines a subfield in signal processing as a part of computer vision.
          - generic [ref=e420]:
            - heading "Robotic navigation" [level=3] [ref=e421]
            - generic [ref=e422]:
              - text: "["
              - link "edit" [ref=e423] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=7
              - text: "]"
          - paragraph [ref=e424]:
            - link "Robot navigation" [ref=e425] [cursor=pointer]:
              - /url: /wiki/Robot_navigation
            - text: sometimes deals with autonomous
            - link "path planning" [ref=e426] [cursor=pointer]:
              - /url: /wiki/Path_planning
            - text: or deliberation for robotic systems to
            - link "navigate through an environment" [ref=e427] [cursor=pointer]:
              - /url: /wiki/Robotic_navigation
            - text: .
            - superscript [ref=e428]:
              - link "[23]" [ref=e429] [cursor=pointer]:
                - /url: "#cite_note-23"
            - text: A detailed understanding of these environments is required to navigate through them. Information about the environment could be provided by a computer vision system, acting as a vision sensor and providing high-level information about the environment and the robot
          - generic [ref=e430]:
            - heading "Visual computing" [level=3] [ref=e431]
            - generic [ref=e432]:
              - text: "["
              - link "edit" [ref=e433] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=8
              - text: "]"
          - generic [ref=e434]:
            - note [ref=e435]:
              - text: This section is an excerpt from
              - link "Visual computing" [ref=e436] [cursor=pointer]:
                - /url: /wiki/Visual_computing
              - text: .
              - generic [ref=e437]:
                - text: "["
                - link "edit" [ref=e438] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Visual_computing&action=edit
                - text: "]"
            - paragraph [ref=e440]:
              - link "Visual computing" [ref=e441] [cursor=pointer]:
                - /url: /wiki/Visual_computing
              - text: is a generic term for all computer science disciplines dealing with images and
              - link "3D models" [ref=e442] [cursor=pointer]:
                - /url: /wiki/3D_model
              - text: ", such as"
              - link "computer graphics" [ref=e443] [cursor=pointer]:
                - /url: /wiki/Computer_graphics
              - text: ","
              - link "image processing" [ref=e444] [cursor=pointer]:
                - /url: /wiki/Image_processing
              - text: ","
              - link "visualization" [ref=e445] [cursor=pointer]:
                - /url: /wiki/Visualization_(graphics)
              - text: ", computer vision,"
              - link "virtual" [ref=e446] [cursor=pointer]:
                - /url: /wiki/Virtual_reality
              - text: and
              - link "augmented reality" [ref=e447] [cursor=pointer]:
                - /url: /wiki/Augmented_reality
              - text: ","
              - link "video processing" [ref=e448] [cursor=pointer]:
                - /url: /wiki/Video_processing
              - text: ", and"
              - link "computational visualistics" [ref=e449] [cursor=pointer]:
                - /url: /wiki/Computational_visualistics
              - text: . Visual computing also includes aspects of
              - link "pattern recognition" [ref=e450] [cursor=pointer]:
                - /url: /wiki/Pattern_recognition
              - text: ", human computer interaction, machine learning and digital libraries. The core challenges are the acquisition, processing, analysis and rendering of visual information (mainly images and video). Application areas include industrial quality control,"
              - link "medical image processing" [ref=e451] [cursor=pointer]:
                - /url: /wiki/Medical_image_processing
              - text: and visualization, surveying,
              - link "robotics" [ref=e452] [cursor=pointer]:
                - /url: /wiki/Robotics
              - text: ", multimedia systems, virtual heritage, special effects in movies and television, and"
              - link "ludology" [ref=e453] [cursor=pointer]:
                - /url: /wiki/Ludology
              - text: . Visual computing also includes
              - link "digital art" [ref=e454] [cursor=pointer]:
                - /url: /wiki/Digital_art
              - text: and
              - link "digital media" [ref=e455] [cursor=pointer]:
                - /url: /wiki/Digital_media
              - text: studies.
          - generic [ref=e456]:
            - heading "Other fields" [level=3] [ref=e457]
            - generic [ref=e458]:
              - text: "["
              - link "edit" [ref=e459] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=9
              - text: "]"
          - paragraph [ref=e460]:
            - text: Besides the above-mentioned views on computer vision, many of the related research topics can also be studied from a purely mathematical point of view. For example, many methods in computer vision are based on
            - link "statistics" [ref=e461] [cursor=pointer]:
              - /url: /wiki/Statistics
            - text: ","
            - link "optimization" [ref=e462] [cursor=pointer]:
              - /url: /wiki/Optimization_(mathematics)
            - text: or
            - link "geometry" [ref=e463] [cursor=pointer]:
              - /url: /wiki/Geometry
            - text: . Finally, a significant part of the field is devoted to the implementation aspect of computer vision; how existing methods can be realized in various combinations of software and hardware, or how these methods can be modified in order to gain processing speed without losing too much performance. Computer vision is also used in fashion eCommerce, inventory management, patent search, furniture, and the beauty industry.
            - superscript [ref=e464]:
              - link "[24]" [ref=e465] [cursor=pointer]:
                - /url: "#cite_note-24"
          - generic [ref=e466]:
            - heading "Distinctions" [level=3] [ref=e467]
            - generic [ref=e468]:
              - text: "["
              - link "edit" [ref=e469] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=10
              - text: "]"
          - paragraph [ref=e470]:
            - text: The fields most closely related to computer vision are
            - link "image processing" [ref=e471] [cursor=pointer]:
              - /url: /wiki/Image_processing
            - text: ","
            - link "image analysis" [ref=e472] [cursor=pointer]:
              - /url: /wiki/Image_analysis
            - text: and
            - link "machine vision" [ref=e473] [cursor=pointer]:
              - /url: /wiki/Machine_vision
            - text: . There is a significant overlap in the range of techniques and applications that these cover. This implies that the basic techniques that are used and developed in these fields are similar, something which can be interpreted as there is only one field with different names. On the other hand, it appears to be necessary for research groups, scientific journals, conferences, and companies to present or market themselves as belonging specifically to one of these fields and, hence, various characterizations which distinguish each of the fields from the others have been presented. In image processing, the input and output are both images, whereas in computer vision, the input is an image or video, and the output could be an enhanced image, an analysis of the image's content, or even a system's behavior based on that analysis.
          - paragraph [ref=e474]:
            - link "Computer graphics" [ref=e475] [cursor=pointer]:
              - /url: /wiki/Computer_graphics
            - text: produces image data from 3D models, and computer vision often produces 3D models from image data.
            - superscript [ref=e476]:
              - link "[25]" [ref=e477] [cursor=pointer]:
                - /url: "#cite_note-3DVAE-25"
            - text: There is also a trend towards a combination of the two disciplines, e.g., as explored in
            - link "augmented reality" [ref=e478] [cursor=pointer]:
              - /url: /wiki/Augmented_reality
            - text: .
          - paragraph [ref=e479]: "The following characterizations appear relevant but should not be taken as universally accepted:"
          - list [ref=e480]:
            - listitem [ref=e481]:
              - link "Image processing" [ref=e482] [cursor=pointer]:
                - /url: /wiki/Image_processing
              - text: and
              - link "image analysis" [ref=e483] [cursor=pointer]:
                - /url: /wiki/Image_analysis
              - text: tend to focus on 2D images, how to transform one image to another, e.g., by pixel-wise operations such as contrast enhancement, local operations such as edge extraction or noise removal, or geometrical transformations such as rotating the image. This characterization implies that image processing/analysis neither requires assumptions nor produces interpretations about the image content.
            - listitem [ref=e484]: Computer vision includes 3D analysis from 2D images. This analyzes the 3D scene projected onto one or several images, e.g., how to reconstruct structure or other information about the 3D scene from one or several images. Computer vision often relies on more or less complex assumptions about the scene depicted in an image.
            - listitem [ref=e485]:
              - link "Machine vision" [ref=e486] [cursor=pointer]:
                - /url: /wiki/Machine_vision
              - text: is the process of applying a range of technologies and methods to provide imaging-based automatic inspection, process control, and robot guidance
              - superscript [ref=e487]:
                - link "[26]" [ref=e488] [cursor=pointer]:
                  - /url: "#cite_note-NASAarticle-26"
              - text: in industrial applications.
              - superscript [ref=e489]:
                - link "[22]" [ref=e490] [cursor=pointer]:
                  - /url: "#cite_note-TextbookP1-22"
              - text: Machine vision tends to focus on applications, mainly in manufacturing, e.g., vision-based robots and systems for vision-based inspection, measurement, or picking (such as
              - link "bin picking" [ref=e491] [cursor=pointer]:
                - /url: /wiki/Bin_picking
              - superscript [ref=e492]:
                - link "[27]" [ref=e493] [cursor=pointer]:
                  - /url: "#cite_note-27"
              - text: ). This implies that image sensor technologies and control theory often are integrated with the processing of image data to control a robot and that real-time processing is emphasized by means of efficient implementations in hardware and software. It also implies that external conditions such as lighting can be and are often more controlled in machine vision than they are in general computer vision, which can enable the use of different algorithms.
            - listitem [ref=e494]:
              - text: There is also a field called
              - link "imaging" [ref=e495] [cursor=pointer]:
                - /url: /wiki/Imaging_science
              - text: which primarily focuses on the process of producing images, but sometimes also deals with the processing and analysis of images. For example,
              - link "medical imaging" [ref=e496] [cursor=pointer]:
                - /url: /wiki/Medical_imaging
              - text: includes substantial work on the analysis of image data in medical applications. Progress in
              - link "convolutional neural networks" [ref=e497] [cursor=pointer]:
                - /url: /wiki/Convolutional_neural_network
              - text: (CNNs) has improved the accurate detection of disease in medical images, particularly in cardiology, pathology, dermatology, and radiology.
              - superscript [ref=e498]:
                - link "[28]" [ref=e499] [cursor=pointer]:
                  - /url: "#cite_note-28"
            - listitem [ref=e500]:
              - text: Finally,
              - link "pattern recognition" [ref=e501] [cursor=pointer]:
                - /url: /wiki/Pattern_recognition
              - text: is a field that uses various methods to extract information from signals in general, mainly based on statistical approaches and
              - link "artificial neural networks" [ref=e502] [cursor=pointer]:
                - /url: /wiki/Artificial_neural_networks
              - text: .
              - superscript [ref=e503]:
                - link "[29]" [ref=e504] [cursor=pointer]:
                  - /url: "#cite_note-29"
              - text: A significant part of this field is devoted to applying these methods to image data.
          - paragraph [ref=e505]:
            - link "Photogrammetry" [ref=e506] [cursor=pointer]:
              - /url: /wiki/Photogrammetry
            - text: also overlaps with computer vision, e.g.,
            - link "stereophotogrammetry" [ref=e507] [cursor=pointer]:
              - /url: /wiki/Stereophotogrammetry
            - text: vs.
            - link "computer stereo vision" [ref=e508] [cursor=pointer]:
              - /url: /wiki/Computer_stereo_vision
            - text: .
          - generic [ref=e509]:
            - heading "Applications" [level=2] [ref=e510]
            - generic [ref=e511]:
              - text: "["
              - link "edit" [ref=e512] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=11
              - text: "]"
          - paragraph [ref=e513]:
            - text: Applications range from tasks such as industrial
            - link "machine vision" [ref=e514] [cursor=pointer]:
              - /url: /wiki/Machine_vision
            - text: "systems which, say, inspect bottles speeding by on a production line, to research into artificial intelligence and computers or robots that can comprehend the world around them. The computer vision and machine vision fields have significant overlap. Computer vision covers the core technology of automated image analysis which is used in many fields. Machine vision usually refers to a process of combining automated image analysis with other methods and technologies to provide automated inspection and robot guidance in industrial applications. In many computer-vision applications, computers are pre-programmed to solve a particular task, but methods based on learning are now becoming increasingly common. Examples of applications of computer vision include systems for:"
          - figure "Learning 3D shapes has been a challenging task in computer vision. Recent advances in deep learning have enabled researchers to build models that are able to generate and reconstruct 3D shapes from single or multi-view depth maps or silhouettes seamlessly and efficiently.[25]" [ref=e515]:
            - link [ref=e516] [cursor=pointer]:
              - /url: /wiki/File:Synthesizing_3D_Shapes_via_Modeling_Multi-View_Depth_Maps_and_Silhouettes_With_Deep_Generative_Networks.png
              - img [ref=e517]
            - generic [ref=e518]:
              - text: Learning 3D shapes has been a challenging task in computer vision. Recent advances in
              - link "deep learning" [ref=e519] [cursor=pointer]:
                - /url: /wiki/Deep_learning
              - text: have enabled researchers to build models that are able to generate and reconstruct 3D shapes from single or multi-view
              - link "depth maps" [ref=e520] [cursor=pointer]:
                - /url: /wiki/Depth_map
              - text: or silhouettes seamlessly and efficiently.
              - superscript [ref=e521]:
                - link "[25]" [ref=e522] [cursor=pointer]:
                  - /url: "#cite_note-3DVAE-25"
          - list [ref=e523]:
            - listitem [ref=e524]: Automatic inspection, e.g., in manufacturing applications;
            - listitem [ref=e525]:
              - text: Assisting humans in identification tasks, e.g., a
              - link "species identification" [ref=e526] [cursor=pointer]:
                - /url: /wiki/Automated_species_identification
              - text: system;
              - superscript [ref=e527]:
                - link "[30]" [ref=e528] [cursor=pointer]:
                  - /url: "#cite_note-30"
            - listitem [ref=e529]:
              - text: Controlling processes, e.g., an
              - link "industrial robot" [ref=e530] [cursor=pointer]:
                - /url: /wiki/Industrial_robots
              - text: ;
            - listitem [ref=e531]:
              - link "Detecting events" [ref=e532] [cursor=pointer]:
                - /url: /wiki/Activity_recognition
              - text: ", e.g., for"
              - link "visual surveillance" [ref=e533] [cursor=pointer]:
                - /url: /wiki/Artificial_intelligence_for_video_surveillance
              - text: or
              - link "people counting" [ref=e534] [cursor=pointer]:
                - /url: /wiki/People_counter
              - text: ", e.g., in the"
              - link "restaurant industry" [ref=e535] [cursor=pointer]:
                - /url: /wiki/Presto_(restaurant_technology_platform)
              - text: ;
            - listitem [ref=e536]:
              - text: Interaction, e.g., as the input to a device for
              - link "computer-human interaction" [ref=e537] [cursor=pointer]:
                - /url: /wiki/Computer-human_interaction
              - text: ;
            - listitem [ref=e538]:
              - link "MediaPipe" [ref=e539] [cursor=pointer]:
                - /url: /wiki/MediaPipe
              - text: ", an open-source framework from Google for AI edge device computing, e.g., face detection, image classification, object detection;"
            - listitem [ref=e540]:
              - text: monitoring agricultural crops, e.g. an open-source
              - link "vision transformers" [ref=e541] [cursor=pointer]:
                - /url: /wiki/Vision_transformer
              - text: model
              - superscript [ref=e542]:
                - link "[31]" [ref=e543] [cursor=pointer]:
                  - /url: "#cite_note-31"
              - text: has been developed to help farmers automatically detect
              - link "strawberry diseases" [ref=e544] [cursor=pointer]:
                - /url: /wiki/List_of_strawberry_diseases
              - text: with 98.4% accuracy.
              - superscript [ref=e545]:
                - link "[32]" [ref=e546] [cursor=pointer]:
                  - /url: "#cite_note-32"
            - listitem [ref=e547]:
              - text: Modeling objects or environments, e.g., medical image analysis or
              - link "topographical" [ref=e548] [cursor=pointer]:
                - /url: /wiki/Topographic_map
              - text: modeling;
            - listitem [ref=e549]:
              - text: Navigation, e.g., by an
              - link "autonomous vehicle" [ref=e550] [cursor=pointer]:
                - /url: /wiki/Autonomous_vehicle
              - text: or
              - link "mobile robot" [ref=e551] [cursor=pointer]:
                - /url: /wiki/Mobile_robot
              - text: ;
            - listitem [ref=e552]:
              - text: Organizing information, e.g., for
              - link "indexing" [ref=e553] [cursor=pointer]:
                - /url: /wiki/Search_engine_indexing
              - text: databases of images and image sequences.
            - listitem [ref=e554]:
              - text: Tracking surfaces or planes in 3D coordinates for allowing
              - link "Augmented Reality" [ref=e555] [cursor=pointer]:
                - /url: /wiki/Augmented_reality
              - text: experiences.
            - listitem [ref=e556]: Analyzing the condition of facilities in industry or construction.
            - listitem [ref=e557]:
              - text: Automatic real-time lip-reading for devices and apps to assist people with disabilities.
              - superscript [ref=e558]:
                - link "[33]" [ref=e559] [cursor=pointer]:
                  - /url: "#cite_note-33"
          - paragraph [ref=e560]:
            - text: For 2024, the leading areas of computer vision were industry (market size US$5.22 billion),
            - superscript [ref=e561]:
              - link "[34]" [ref=e562] [cursor=pointer]:
                - /url: "#cite_note-34"
            - text: medicine (market size US$2.6 billion),
            - superscript [ref=e563]:
              - link "[35]" [ref=e564] [cursor=pointer]:
                - /url: "#cite_note-35"
            - text: military (market size US$996.2 million).
            - superscript [ref=e565]:
              - link "[36]" [ref=e566] [cursor=pointer]:
                - /url: "#cite_note-36"
          - generic [ref=e567]:
            - heading "Medicine" [level=3] [ref=e568]
            - generic [ref=e569]:
              - text: "["
              - link "edit" [ref=e570] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=12
              - text: "]"
          - figure "DARPA's Visual Media Reasoning concept video" [ref=e571]:
            - generic [ref=e574]:
              - link "DARPA" [ref=e575] [cursor=pointer]:
                - /url: /wiki/DARPA
              - text: "'s Visual Media Reasoning concept video"
          - paragraph [ref=e576]:
            - text: One of the most prominent application fields is
            - link "medical computer vision" [ref=e577] [cursor=pointer]:
              - /url: /wiki/Medical_computer_vision
            - text: ", or medical image processing, characterized by the extraction of information from image data to"
            - link "diagnose a patient." [ref=e578] [cursor=pointer]:
              - /url: /wiki/Computer-assisted_diagnosis
            - superscript [ref=e579]:
              - link "[37]" [ref=e580] [cursor=pointer]:
                - /url: "#cite_note-37"
            - text: An example of this is the detection of
            - link "tumours" [ref=e581] [cursor=pointer]:
              - /url: /wiki/Tumour
            - text: ","
            - link "arteriosclerosis" [ref=e582] [cursor=pointer]:
              - /url: /wiki/Arteriosclerosis
            - text: "or other malign changes, and a variety of dental pathologies; measurements of organ dimensions, blood flow, etc. are another example. It also supports medical research by providing new information: e.g., about the structure of the brain or the quality of medical treatments. Applications of computer vision in the medical area also include enhancement of images interpreted by humans—"
            - link "ultrasonic images" [ref=e583] [cursor=pointer]:
              - /url: /wiki/Ultrasound
            - text: or
            - link "X-ray images" [ref=e584] [cursor=pointer]:
              - /url: /wiki/Radiography
            - text: ", for example—to reduce the influence of noise."
          - generic [ref=e585]:
            - heading "Machine vision" [level=3] [ref=e586]
            - generic [ref=e587]:
              - text: "["
              - link "edit" [ref=e588] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=13
              - text: "]"
          - paragraph [ref=e589]:
            - text: A second application area in computer vision is in industry, sometimes called
            - link "machine vision" [ref=e590] [cursor=pointer]:
              - /url: /wiki/Machine_vision
            - text: ", where information is extracted for the purpose of supporting a production process. One example is quality control where details or final products are being automatically inspected in order to find defects. One of the most prevalent fields for such inspecti is the"
            - link "Wafer" [ref=e591] [cursor=pointer]:
              - /url: /wiki/Wafer_(electronics)
            - text: industry in which every single Wafer is being measured and inspected for inaccuracies or defects to prevent a
            - link "computer chip" [ref=e592] [cursor=pointer]:
              - /url: /wiki/Integrated_circuit
            - text: from coming to market in an unusable manner. Another example is a measurement of the position and orientation of details to be picked up by a robot arm. Machine vision is also heavily used in the agricultural processes to remove undesirable foodstuff from bulk material, a process called
            - link "optical sorting" [ref=e593] [cursor=pointer]:
              - /url: /wiki/Optical_sorting
            - text: .
            - superscript [ref=e594]:
              - link "[38]" [ref=e595] [cursor=pointer]:
                - /url: "#cite_note-Davies-2005-38"
          - generic [ref=e596]:
            - heading "Military" [level=3] [ref=e597]
            - generic [ref=e598]:
              - text: "["
              - link "edit" [ref=e599] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=14
              - text: "]"
          - paragraph [ref=e600]:
            - text: The obvious examples are the detection of enemy soldiers or vehicles and
            - link "missile guidance" [ref=e601] [cursor=pointer]:
              - /url: /wiki/Missile_guidance
            - text: . More advanced systems for missile guidance send the missile to an area rather than a specific target, and target selection is made when the missile reaches the area based on locally acquired image data. Modern military concepts, such as "battlefield awareness", imply that various sensors, including image sensors, provide a rich set of information about a combat scene that can be used to support strategic decisions. In this case, automatic processing of the data is used to reduce complexity and to fuse information from multiple sensors to increase reliability.
          - generic [ref=e602]:
            - heading "Autonomous vehicles" [level=3] [ref=e603]
            - generic [ref=e604]:
              - text: "["
              - link "edit" [ref=e605] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=15
              - text: "]"
          - figure "Artist's concept of Curiosity, an example of an uncrewed land-based vehicle. The stereo camera is mounted on top of the rover." [ref=e606]:
            - link [ref=e607] [cursor=pointer]:
              - /url: /wiki/File:Mars_Science_Laboratory,_2011-Present.jpg
            - generic [ref=e608]:
              - text: Artist's concept of
              - link "Curiosity" [ref=e610] [cursor=pointer]:
                - /url: /wiki/Curiosity_(rover)
              - text: ", an example of an uncrewed land-based vehicle. The"
              - link "stereo camera" [ref=e611] [cursor=pointer]:
                - /url: /wiki/Stereo_camera
              - text: is mounted on top of the rover.
          - paragraph [ref=e612]:
            - text: One of the newer application areas is autonomous vehicles, which include
            - link "submersibles" [ref=e613] [cursor=pointer]:
              - /url: /wiki/Submersible
            - text: ", land-based vehicles (small robots with wheels, cars, or trucks), aerial vehicles, and unmanned aerial vehicles ("
            - link "UAV" [ref=e614] [cursor=pointer]:
              - /url: /wiki/Unmanned_aerial_vehicle
            - text: ). The level of autonomy ranges from fully autonomous (unmanned) vehicles to vehicles where computer-vision-based systems support a driver or a pilot in various situations. Fully autonomous vehicles typically use computer vision for navigation, e.g., for knowing where they are or mapping their environment (
            - link "SLAM" [ref=e615] [cursor=pointer]:
              - /url: /wiki/Simultaneous_localization_and_mapping
            - text: ), for detecting obstacles. It can also be used for detecting certain task-specific events, e.g., a UAV looking for forest fires. Examples of supporting systems are obstacle warning systems in cars, cameras and LiDAR sensors in vehicles, and systems for autonomous landing of aircraft. Several car manufacturers have demonstrated systems for
            - link "autonomous driving of cars" [ref=e616] [cursor=pointer]:
              - /url: /wiki/Driverless_car
            - text: . There are ample examples of military autonomous vehicles ranging from advanced missiles to UAVs for recon missions or missile guidance. Space exploration is already being made with autonomous vehicles using computer vision, e.g.,
            - link "NASA" [ref=e617] [cursor=pointer]:
              - /url: /wiki/NASA
            - text: "'s"
            - link "Curiosity" [ref=e619] [cursor=pointer]:
              - /url: /wiki/Curiosity_(rover)
            - text: and
            - link "CNSA" [ref=e620] [cursor=pointer]:
              - /url: /wiki/China_National_Space_Administration
            - text: "'s"
            - link "Yutu-2" [ref=e622] [cursor=pointer]:
              - /url: /wiki/Yutu-2
            - text: rover.
          - generic [ref=e623]:
            - heading "Tactile feedback" [level=3] [ref=e624]
            - generic [ref=e625]:
              - text: "["
              - link "edit" [ref=e626] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=16
              - text: "]"
          - figure "Rubber artificial skin layer with the flexible structure for the shape estimation of micro-undulation surfaces" [ref=e627]:
            - link [ref=e628] [cursor=pointer]:
              - /url: /wiki/File:Finger_sensor.webp
              - img [ref=e629]
            - generic [ref=e630]: Rubber artificial skin layer with the flexible structure for the shape estimation of micro-undulation surfaces
          - figure "Above is a silicon mold with a camera inside containing many different point markers. When this sensor is pressed against the surface, the silicon deforms, and the position of the point markers shifts. A computer can then take this data and determine how exactly the mold is pressed against the surface. This can be used to calibrate robotic hands in order to make sure they can grasp objects effectively." [ref=e631]:
            - link [ref=e632] [cursor=pointer]:
              - /url: /wiki/File:Silicon_Sensor.webp
              - img [ref=e633]
            - generic [ref=e634]: Above is a silicon mold with a camera inside containing many different point markers. When this sensor is pressed against the surface, the silicon deforms, and the position of the point markers shifts. A computer can then take this data and determine how exactly the mold is pressed against the surface. This can be used to calibrate robotic hands in order to make sure they can grasp objects effectively.
          - paragraph [ref=e635]:
            - text: Materials such as rubber and silicon are being used to create sensors that allow for applications such as detecting microundulations and calibrating robotic hands. Rubber can be used in order to create a mold that can be placed over a finger, inside of this mold would be multiple strain gauges. The finger mold and sensors could then be placed on top of a small sheet of rubber containing an array of rubber pins. A user can then wear the finger mold and trace a surface. A computer can then read the data from the strain gauges and measure if one or more of the pins are being pushed upward. If a pin is being pushed upward then the computer can recognize this as an imperfection in the surface. This sort of technology is useful in order to receive accurate data on imperfections on a very large surface.
            - superscript [ref=e636]:
              - link "[39]" [ref=e637] [cursor=pointer]:
                - /url: "#cite_note-:0-39"
            - text: Another variation of this finger mold sensor are sensors that contain a camera suspended in silicon. The silicon forms a dome around the outside of the camera and embedded in the silicon are point markers that are equally spaced. These cameras can then be placed on devices such as robotic hands in order to allow the computer to receive highly accurate tactile data.
            - superscript [ref=e638]:
              - link "[40]" [ref=e639] [cursor=pointer]:
                - /url: "#cite_note-:1-40"
          - paragraph [ref=e640]: "Other application areas include:"
          - list [ref=e641]:
            - listitem [ref=e642]:
              - text: Support of
              - link "visual effects" [ref=e643] [cursor=pointer]:
                - /url: /wiki/Visual_effects
              - text: creation for cinema and broadcast, e.g.,
              - link "camera tracking" [ref=e644] [cursor=pointer]:
                - /url: /wiki/Camera_tracking
              - text: (match moving).
            - listitem [ref=e645]:
              - link "Surveillance" [ref=e646] [cursor=pointer]:
                - /url: /wiki/Surveillance
              - text: .
            - listitem [ref=e647]:
              - link "Driver drowsiness detection" [ref=e648] [cursor=pointer]:
                - /url: /wiki/Driver_drowsiness_detection
              - superscript [ref=e649]:
                - link "[41]" [ref=e650] [cursor=pointer]:
                  - /url: "#cite_note-41"
              - superscript [ref=e651]:
                - link "[42]" [ref=e652] [cursor=pointer]:
                  - /url: "#cite_note-42"
              - superscript [ref=e653]:
                - link "[43]" [ref=e654] [cursor=pointer]:
                  - /url: "#cite_note-43"
            - listitem [ref=e655]:
              - text: Tracking and counting organisms in the biological sciences
              - superscript [ref=e656]:
                - link "[44]" [ref=e657] [cursor=pointer]:
                  - /url: "#cite_note-BruijningVisser2018-44"
          - generic [ref=e658]:
            - heading "Typical tasks" [level=2] [ref=e659]
            - generic [ref=e660]:
              - text: "["
              - link "edit" [ref=e661] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=17
              - text: "]"
          - paragraph [ref=e662]: Each of the application areas described above employ a range of computer vision tasks; more or less well-defined measurement problems or processing problems, which can be solved using a variety of methods. Some examples of typical computer vision tasks are presented below.
          - paragraph [ref=e663]:
            - text: Computer vision tasks include methods for
            - link "acquiring" [ref=e664] [cursor=pointer]:
              - /url: /wiki/Image_sensor
            - text: ","
            - link "processing" [ref=e665] [cursor=pointer]:
              - /url: /wiki/Image_processing
            - text: ","
            - link "analyzing" [ref=e666] [cursor=pointer]:
              - /url: /wiki/Image_analysis
            - text: and understanding digital images, and extraction of
            - link "high-dimensional" [ref=e667] [cursor=pointer]:
              - /url: /wiki/High-dimensional
            - text: data from the real world in order to produce numerical or symbolic information, e.g., in the forms of decisions.
            - superscript [ref=e668]:
              - link "[1]" [ref=e669] [cursor=pointer]:
                - /url: "#cite_note-Klette-2014-1"
            - superscript [ref=e670]:
              - link "[2]" [ref=e671] [cursor=pointer]:
                - /url: "#cite_note-Shapiro-Stockman-2001-2"
            - superscript [ref=e672]:
              - link "[3]" [ref=e673] [cursor=pointer]:
                - /url: "#cite_note-Morris-2004-3"
            - superscript [ref=e674]:
              - link "[4]" [ref=e675] [cursor=pointer]:
                - /url: "#cite_note-Jahne-Haussecker-2000-4"
            - text: Understanding in this context means the transformation of visual images into descriptions of the world that can interface with other thought processes and elicit appropriate action. This image understanding can be seen as the disentangling of symbolic information from image data using models constructed with the aid of geometry, physics, statistics, and learning theory.
            - superscript [ref=e676]:
              - link "[45]" [ref=e677] [cursor=pointer]:
                - /url: "#cite_note-Forsyth-Ponce-2003-45"
          - generic [ref=e678]:
            - heading "Recognition" [level=3] [ref=e679]
            - generic [ref=e680]:
              - text: "["
              - link "edit" [ref=e681] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=18
              - text: "]"
          - paragraph [ref=e682]:
            - text: The classical problem in computer vision, image processing, and
            - link "machine vision" [ref=e683] [cursor=pointer]:
              - /url: /wiki/Machine_vision
            - text: is that of determining whether or not the image data contains some specific object, feature, or activity. Different varieties of recognition problem are described in the literature.
            - superscript [ref=e684]:
              - link "[46]" [ref=e685] [cursor=pointer]:
                - /url: "#cite_note-Forsyth2012-46"
          - list [ref=e686]:
            - listitem [ref=e687]:
              - link "Object recognition" [ref=e689] [cursor=pointer]:
                - /url: /wiki/Object_recognition
              - text: (also called object classification) – one or several pre-specified or learned objects or object classes can be recognized, usually together with their 2D positions in the image or 3D poses in the scene. Blippar,
              - link "Google Goggles" [ref=e690] [cursor=pointer]:
                - /url: /wiki/Google_Goggles
              - text: ", and LikeThat provide stand-alone programs that illustrate this functionality."
            - listitem [ref=e691]:
              - text: Identification – an individual instance of an object is recognized. Examples include identification of a specific person's face or fingerprint,
              - link "identification of handwritten digits" [ref=e692] [cursor=pointer]:
                - /url: /wiki/Handwriting_recognition
              - text: ", or the identification of a specific vehicle."
            - listitem [ref=e693]:
              - link "Detection" [ref=e695] [cursor=pointer]:
                - /url: /wiki/Object_detection
              - text: – the image data are scanned for specific objects along with their locations. Examples include the detection of an obstacle in the car's field of view and possible abnormal cells or tissues in medical images or the detection of a vehicle in an automatic road toll system. Detection based on relatively simple and fast computations is sometimes used for finding smaller regions of interesting image data which can be further analyzed by more computationally demanding techniques to produce a correct interpretation.
          - paragraph [ref=e696]:
            - text: Currently, the best algorithms for such tasks are based on
            - link "convolutional neural networks" [ref=e697] [cursor=pointer]:
              - /url: /wiki/Convolutional_neural_network
            - text: . An illustration of their capabilities is given by the
            - link "ImageNet Large Scale Visual Recognition Challenge" [ref=e698] [cursor=pointer]:
              - /url: /wiki/ImageNet#ImageNet_Challenge
            - text: ; this is a benchmark in object classification and detection, with millions of images and 1000 object classes used in the competition.
            - superscript [ref=e699]:
              - link "[47]" [ref=e700] [cursor=pointer]:
                - /url: "#cite_note-:2-47"
            - text: Performance of convolutional neural networks on the ImageNet tests is now close to that of humans.
            - superscript [ref=e701]:
              - link "[47]" [ref=e702] [cursor=pointer]:
                - /url: "#cite_note-:2-47"
            - text: The best algorithms still struggle with objects that are small or thin, such as a small ant on the stem of a flower or a person holding a quill in their hand. They also have trouble with images that have been distorted with filters (an increasingly common phenomenon with modern digital cameras). By contrast, those kinds of images rarely trouble humans. Humans, however, tend to have trouble with other issues. For example, they are not good at classifying objects into fine-grained classes, such as the particular breed of dog or species of bird, whereas convolutional neural networks handle this with ease.
            - superscript [ref=e703]:
              - text: "["
              - link "citation needed" [ref=e705] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - paragraph [ref=e706]: "Several specialized tasks based on recognition exist, such as:"
          - list [ref=e707]:
            - listitem [ref=e708]:
              - link "Content-based image retrieval" [ref=e710] [cursor=pointer]:
                - /url: /wiki/Content-based_image_retrieval
              - text: – finding all images in a larger set of images which have a specific content. The content can be specified in different ways, for example in terms of similarity relative to a target image (give me all images similar to image X) by utilizing
              - link "reverse image search" [ref=e711] [cursor=pointer]:
                - /url: /wiki/Reverse_image_search
              - text: techniques, or in terms of high-level search criteria given as text input (give me all images which contain many houses, are taken during winter and have no cars in them).
          - figure "Computer vision for people counter purposes in public places, malls, shopping centers" [ref=e712]:
            - link [ref=e713] [cursor=pointer]:
              - /url: /wiki/File:SRT_Shape_Recognition_Technology.png
              - img [ref=e714]
            - generic [ref=e715]:
              - text: Computer vision for
              - link "people counter" [ref=e716] [cursor=pointer]:
                - /url: /wiki/People_counter
              - text: purposes in public places, malls, shopping centers
          - list [ref=e717]:
            - listitem [ref=e718]:
              - link "Pose estimation" [ref=e720] [cursor=pointer]:
                - /url: /wiki/Pose_(computer_vision)
              - text: – estimating the position or orientation of a specific object relative to the camera. An example application for this technique would be assisting a robot arm in retrieving objects from a conveyor belt in an
              - link "assembly line" [ref=e721] [cursor=pointer]:
                - /url: /wiki/Assembly_line
              - text: situation or picking parts from a bin.
            - listitem [ref=e722]:
              - link "Optical character recognition" [ref=e724] [cursor=pointer]:
                - /url: /wiki/Optical_character_recognition
              - text: (OCR) – identifying
              - link "characters" [ref=e725] [cursor=pointer]:
                - /url: /wiki/Character_(computing)
              - text: in images of printed or handwritten text, usually with a view to encoding the text in a format more amenable to editing or
              - link "indexing" [ref=e726] [cursor=pointer]:
                - /url: /wiki/Search_index
              - text: (e.g.
              - link "ASCII" [ref=e727] [cursor=pointer]:
                - /url: /wiki/ASCII
              - text: ). A related task is reading of 2D codes such as
              - link "data matrix" [ref=e728] [cursor=pointer]:
                - /url: /wiki/Data_Matrix
              - text: and
              - link "QR" [ref=e729] [cursor=pointer]:
                - /url: /wiki/QR_code
              - text: codes.
            - listitem [ref=e730]:
              - generic [ref=e731]:
                - link "Facial recognition" [ref=e732] [cursor=pointer]:
                  - /url: /wiki/Facial_recognition_system
                - text: –
              - text: a technology that enables the matching of faces in digital images or video frames to a face database, which is now widely used for mobile phone facelock, smart door locking, etc.
              - superscript [ref=e733]:
                - link "[48]" [ref=e734] [cursor=pointer]:
                  - /url: "#cite_note-48"
            - listitem [ref=e735]:
              - link "Emotion recognition" [ref=e736] [cursor=pointer]:
                - /url: /wiki/Emotion_recognition
              - text: – a subset of facial recognition, emotion recognition refers to the process of classifying human
              - link "emotions." [ref=e737] [cursor=pointer]:
                - /url: /wiki/Emotion
              - text: Psychologists caution, however, that internal emotions cannot be reliably detected from faces.
              - superscript [ref=e738]:
                - link "[49]" [ref=e739] [cursor=pointer]:
                  - /url: "#cite_note-49"
            - listitem [ref=e740]:
              - link "Shape Recognition Technology" [ref=e742] [cursor=pointer]:
                - /url: /wiki/Pattern_recognition
              - text: (SRT) in
              - link "people counter" [ref=e743] [cursor=pointer]:
                - /url: /wiki/People_counter
              - text: systems differentiating human beings (head and shoulder patterns) from objects.
            - listitem [ref=e744]:
              - link "Human activity recognition" [ref=e746] [cursor=pointer]:
                - /url: /wiki/Activity_recognition
              - text: "- deals with recognizing the activity from a series of video frames, such as, if the person is picking up an object or walking."
          - generic [ref=e747]:
            - heading "Motion analysis" [level=3] [ref=e748]
            - generic [ref=e749]:
              - text: "["
              - link "edit" [ref=e750] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=19
              - text: "]"
          - paragraph [ref=e751]: "Several tasks relate to motion estimation, where an image sequence is processed to produce an estimate of the velocity either at each points in the image or in the 3D scene or even of the camera that produces the images. Examples of such tasks are:"
          - list [ref=e752]:
            - listitem [ref=e753]:
              - link "Egomotion" [ref=e755] [cursor=pointer]:
                - /url: /wiki/Egomotion
              - text: – determining the 3D rigid motion (rotation and translation) of the camera from an image sequence produced by the camera.
            - listitem [ref=e756]:
              - link "Tracking" [ref=e758] [cursor=pointer]:
                - /url: /wiki/Video_tracking
              - text: – following the movements of a (usually) smaller set of interest points or objects (e.g., vehicles, objects, humans or other organisms
              - superscript [ref=e759]:
                - link "[44]" [ref=e760] [cursor=pointer]:
                  - /url: "#cite_note-BruijningVisser2018-44"
              - text: ) in the image sequence. This has vast industry applications as most high-running machinery can be monitored in this way.
            - listitem [ref=e761]:
              - link "Optical flow" [ref=e763] [cursor=pointer]:
                - /url: /wiki/Optical_flow
              - text: – to determine, for each point in the image, how that point is moving relative to the image plane, i.e., its apparent motion. This motion is a result of both how the corresponding 3D point is moving in the scene and how the camera is moving relative to the scene.
          - generic [ref=e764]:
            - heading "Scene reconstruction" [level=3] [ref=e765]
            - generic [ref=e766]:
              - text: "["
              - link "edit" [ref=e767] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=20
              - text: "]"
          - paragraph [ref=e768]:
            - text: Given one or (typically) more images of a scene, or a video, scene reconstruction aims at
            - link "computing a 3D model" [ref=e769] [cursor=pointer]:
              - /url: /wiki/3D_reconstruction
            - text: of the scene. In the simplest case, the model can be a set of 3D points. More sophisticated methods produce a complete 3D surface model. The advent of 3D imaging not requiring motion or scanning, and related processing algorithms is enabling rapid advances in this field. Grid-based 3D sensing can be used to acquire 3D images from multiple angles. Algorithms are now available to stitch multiple 3D images together into point clouds and 3D models.
            - superscript [ref=e770]:
              - link "[25]" [ref=e771] [cursor=pointer]:
                - /url: "#cite_note-3DVAE-25"
          - generic [ref=e772]:
            - heading "Image restoration" [level=3] [ref=e773]
            - generic [ref=e774]:
              - text: "["
              - link "edit" [ref=e775] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=21
              - text: "]"
          - paragraph [ref=e776]: Image restoration comes into the picture when the original image is degraded or damaged due to some external factors like lens wrong positioning, transmission interference, low lighting or motion blurs, etc., which is referred to as noise. When the images are degraded or damaged, the information to be extracted from them also gets damaged. Therefore, we need to recover or restore the image as it was intended to be. The aim of image restoration is the removal of noise (sensor noise, motion blur, etc.) from images. The simplest possible approach for noise removal is various types of filters, such as low-pass filters or median filters. More sophisticated methods assume a model of how the local image structures look to distinguish them from noise. By first analyzing the image data in terms of the local image structures, such as lines or edges, and then controlling the filtering based on local information from the analysis step, a better level of noise removal is usually obtained compared to the simpler approaches.
          - paragraph [ref=e777]:
            - text: An example in this field is
            - link "inpainting" [ref=e778] [cursor=pointer]:
              - /url: /wiki/Inpainting
            - text: .
          - generic [ref=e779]:
            - heading "System methods" [level=2] [ref=e780]
            - generic [ref=e781]:
              - text: "["
              - link "edit" [ref=e782] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=22
              - text: "]"
          - paragraph [ref=e783]: The organization of a computer vision system is highly application-dependent. Some systems are stand-alone applications that solve a specific measurement or detection problem, while others constitute a sub-system of a larger design which, for example, also contains sub-systems for control of mechanical actuators, planning, information databases, man-machine interfaces, etc. The specific implementation of a computer vision system also depends on whether its functionality is pre-specified or if some part of it can be learned or modified during operation. Many functions are unique to the application. There are, however, typical functions that are found in many computer vision systems.
          - list [ref=e784]:
            - listitem [ref=e785]:
              - text: Image acquisition – A digital image is produced by one or several
              - link "image sensors" [ref=e786] [cursor=pointer]:
                - /url: /wiki/Image_sensor
              - text: ", which, besides various types of light-sensitive cameras, include"
              - link "range sensors" [ref=e787] [cursor=pointer]:
                - /url: /wiki/Rangefinder_camera
              - text: ", tomography devices, radar, ultra-sonic cameras, etc. Depending on the type of sensor, the resulting image data is an ordinary 2D image, a 3D volume, or an image sequence. The pixel values typically correspond to light intensity in one or several spectral bands (gray images or colour images) but can also be related to various physical measures, such as depth, absorption or reflectance of sonic or electromagnetic waves, or"
              - link "magnetic resonance imaging" [ref=e788] [cursor=pointer]:
                - /url: /wiki/Magnetic_resonance_imaging
              - text: .
              - superscript [ref=e789]:
                - link "[38]" [ref=e790] [cursor=pointer]:
                  - /url: "#cite_note-Davies-2005-38"
            - listitem [ref=e791]:
              - text: "Pre-processing – Before a computer vision method can be applied to image data in order to extract some specific piece of information, it is usually necessary to process the data in order to ensure that it satisfies certain assumptions implied by the method. Examples are:"
              - list [ref=e792]:
                - listitem [ref=e793]: Re-sampling to ensure that the image coordinate system is correct.
                - listitem [ref=e794]: Noise reduction to ensure that sensor noise does not introduce false information.
                - listitem [ref=e795]: Contrast enhancement to ensure that relevant information can be detected.
                - listitem [ref=e796]:
                  - link "Scale space" [ref=e797] [cursor=pointer]:
                    - /url: /wiki/Scale_space
                  - text: representation to enhance image structures at locally appropriate scales.
            - listitem [ref=e798]:
              - link "Feature extraction" [ref=e800] [cursor=pointer]:
                - /url: /wiki/Feature_detection_(computer_vision)
              - text: – Image features at various levels of complexity are extracted from the image data.
              - superscript [ref=e801]:
                - link "[38]" [ref=e802] [cursor=pointer]:
                  - /url: "#cite_note-Davies-2005-38"
              - text: "Typical examples of such features are:"
              - list [ref=e803]:
                - listitem [ref=e804]:
                  - text: Lines,
                  - link "edges" [ref=e805] [cursor=pointer]:
                    - /url: /wiki/Edge_detection
                  - text: and
                  - link "ridges" [ref=e806] [cursor=pointer]:
                    - /url: /wiki/Ridge_detection
                  - text: .
                - listitem [ref=e807]:
                  - text: Localized
                  - link "interest points" [ref=e808] [cursor=pointer]:
                    - /url: /wiki/Interest_point_detection
                  - text: such as
                  - link "corners" [ref=e809] [cursor=pointer]:
                    - /url: /wiki/Corner_detection
                  - text: ","
                  - link "blobs" [ref=e810] [cursor=pointer]:
                    - /url: /wiki/Blob_detection
                  - text: or points.
          - definition [ref=e812]: More complex features may be related to texture, shape, or motion.
          - list [ref=e813]:
            - listitem [ref=e814]:
              - generic [ref=e815]:
                - link "Detection" [ref=e816] [cursor=pointer]:
                  - /url: /wiki/Object_detection
                - text: /
                - link "segmentation" [ref=e817] [cursor=pointer]:
                  - /url: /wiki/Image_segmentation
              - text: – At some point in the processing, a decision is made about which image points or regions of the image are relevant for further processing.
              - superscript [ref=e818]:
                - link "[38]" [ref=e819] [cursor=pointer]:
                  - /url: "#cite_note-Davies-2005-38"
              - text: "Examples are:"
              - list [ref=e820]:
                - listitem [ref=e821]: Selection of a specific set of interest points.
                - listitem [ref=e822]: Segmentation of one or multiple image regions that contain a specific object of interest.
                - listitem [ref=e823]:
                  - text: Segmentation of image into nested scene architecture comprising foreground, object groups, single objects or
                  - link "salient" [ref=e824] [cursor=pointer]:
                    - /url: /wiki/Salience_(neuroscience)
                  - text: object
                  - superscript [ref=e825]:
                    - link "[50]" [ref=e826] [cursor=pointer]:
                      - /url: "#cite_note-50"
                  - text: parts (also referred to as spatial-taxon scene hierarchy),
                  - superscript [ref=e827]:
                    - link "[51]" [ref=e828] [cursor=pointer]:
                      - /url: "#cite_note-51"
                  - text: while the
                  - link "visual salience" [ref=e829] [cursor=pointer]:
                    - /url: /wiki/Salience_(neuroscience)
                  - text: is often implemented as
                  - link "spatial" [ref=e830] [cursor=pointer]:
                    - /url: /wiki/Visual_spatial_attention
                  - text: and
                  - link "temporal attention" [ref=e831] [cursor=pointer]:
                    - /url: /wiki/Visual_temporal_attention
                  - text: .
                - listitem [ref=e832]:
                  - text: Segmentation or
                  - link "co-segmentation" [ref=e833] [cursor=pointer]:
                    - /url: /wiki/Object_co-segmentation
                  - text: of one or multiple videos into a series of per-frame foreground masks while maintaining its temporal semantic continuity.
                  - superscript [ref=e834]:
                    - link "[52]" [ref=e835] [cursor=pointer]:
                      - /url: "#cite_note-Liu_Wang_Hua_Zhang_2018_pp._5840–5853-52"
                  - superscript [ref=e836]:
                    - link "[53]" [ref=e837] [cursor=pointer]:
                      - /url: "#cite_note-Wang_Duan_Zhang_Niu_p=1657-53"
            - listitem [ref=e838]:
              - text: High-level processing – At this step, the input is typically a small set of data, for example, a set of points or an image region, which is assumed to contain a specific object.
              - superscript [ref=e839]:
                - link "[38]" [ref=e840] [cursor=pointer]:
                  - /url: "#cite_note-Davies-2005-38"
              - text: "The remaining processing deals with, for example:"
              - list [ref=e841]:
                - listitem [ref=e842]: Verification that the data satisfies model-based and application-specific assumptions.
                - listitem [ref=e843]: Estimation of application-specific parameters, such as object pose or object size.
                - listitem [ref=e844]:
                  - link "Image recognition" [ref=e845] [cursor=pointer]:
                    - /url: /wiki/Image_recognition
                  - text: – classifying a detected object into different categories.
                - listitem [ref=e846]:
                  - link "Image registration" [ref=e847] [cursor=pointer]:
                    - /url: /wiki/Image_registration
                  - text: – comparing and combining two different views of the same object.
            - listitem [ref=e848]:
              - text: Decision making Making the final decision required for the application,
              - superscript [ref=e849]:
                - link "[38]" [ref=e850] [cursor=pointer]:
                  - /url: "#cite_note-Davies-2005-38"
              - text: "for example:"
              - list [ref=e851]:
                - listitem [ref=e852]: Pass/fail on automatic inspection applications.
                - listitem [ref=e853]: Match/no-match in recognition applications.
                - listitem [ref=e854]: Flag for further human review in medical, military, security and recognition applications.
          - generic [ref=e855]:
            - heading "Image-understanding systems" [level=3] [ref=e856]
            - generic [ref=e857]:
              - text: "["
              - link "edit" [ref=e858] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=23
              - text: "]"
          - paragraph [ref=e859]: "Image-understanding systems (IUS) include three levels of abstraction as follows: low level includes image primitives such as edges, texture elements, or regions; intermediate level includes boundaries, surfaces and volumes; and high level includes objects, scenes, or events. Many of these requirements are entirely topics for further research."
          - paragraph [ref=e860]: "The representational requirements in the designing of IUS for these levels are: representation of prototypical concepts, concept organization, spatial knowledge, temporal knowledge, scaling, and description by comparison and differentiation."
          - paragraph [ref=e861]:
            - text: "While inference refers to the process of deriving new, not explicitly represented facts from currently known facts, control refers to the process that selects which of the many inference, search, and matching techniques should be applied at a particular stage of processing. Inference and control requirements for IUS are: search and hypothesis activation, matching and hypothesis testing, generation and use of expectations, change and focus of attention, certainty and strength of belief, inference and goal satisfaction."
            - superscript [ref=e862]:
              - link "[54]" [ref=e863] [cursor=pointer]:
                - /url: "#cite_note-54"
          - generic [ref=e864]:
            - heading "Hardware" [level=2] [ref=e865]
            - generic [ref=e866]:
              - text: "["
              - link "edit" [ref=e867] [cursor=pointer]:
                - /url: /w/index.php?title=Computer_vision&action=edit&section=24
              - text: "]"
          - figure "A 2020 model iPad Pro with a LiDAR sensor" [ref=e868]:
            - link [ref=e869] [cursor=pointer]:
              - /url: /wiki/File:LiDAR_Scanner_and_Back_Camera_of_iPad_Pro_2020_-_3.jpg
              - img [ref=e870]
            - generic [ref=e871]:
              - text: A
              - link "2020 model iPad Pro" [ref=e872] [cursor=pointer]:
                - /url: /wiki/IPad_Pro_(4th_generation)
              - text: with a
              - link "LiDAR" [ref=e873] [cursor=pointer]:
                - /url: /wiki/LiDAR
              - text: sensor
          - paragraph [ref=e874]: "There are many kinds of computer vision systems; however, all of them contain these basic elements: a power source, at least one image acquisition device (camera, ccd, etc.), a processor, and control and communication cables or some kind of wireless interconnection mechanism. In addition, a practical vision system contains software, as well as a display in order to monitor the system. Vision systems for inner spaces, as most industrial ones, contain an illumination system and may be placed in a controlled environment. Furthermore, a completed system includes many accessories, such as camera supports, cables, and connectors."
          - paragraph [ref=e875]: Most computer vision systems use visible-light cameras passively viewing a scene at frame rates of at most 60 frames per second (usually far slower).
          - paragraph [ref=e876]:
            - text: A few computer vision systems use image-acquisition hardware with active illumination or something other than visible light or both, such as
            - link "structured-light 3D scanners" [ref=e877] [cursor=pointer]:
              - /url: /wiki/Structured-light_3D_scanner
            - text: ","
            - link "thermographic cameras" [ref=e878] [cursor=pointer]:
              - /url: /wiki/Thermographic_camera
            - text: ","
            - link "hyperspectral imagers" [ref=e879] [cursor=pointer]:
              - /url: /wiki/Hyperspectral_imager
            - text: ","
            - link "radar imaging" [ref=e880] [cursor=pointer]:
              - /url: /wiki/Radar_imaging
            - text: ","
            - link "lidar" [ref=e881] [cursor=pointer]:
              - /url: /wiki/Lidar
            - text: scanners,
            - link "magnetic resonance images" [ref=e882] [cursor=pointer]:
              - /url: /wiki/Magnetic_resonance_image
            - text: ","
            - link "side-scan sonar" [ref=e883] [cursor=pointer]:
              - /url: /wiki/Side-scan_sonar
            - text: ","
            - link "synthetic aperture sonar" [ref=e884] [cursor=pointer]:
              - /url: /wiki/Synthetic_aperture_sonar
            - text: ", etc. Such hardware captures \"images\" that are then processed often using the same computer vision algorithms used to process visible-light images."
          - paragraph [ref=e885]:
            - text: While traditional broadcast and consumer video systems operate at a rate of 30 frames per second, advances in
            - link "digital signal processing" [ref=e886] [cursor=pointer]:
              - /url: /wiki/Digital_signal_processing
            - text: and
            - link "consumer graphics hardware" [ref=e887] [cursor=pointer]:
              - /url: /wiki/Graphics_processing_unit
            - text: has made high-speed image acquisition, processing, and display possible for real-time systems on the order of hundreds to thousands of frames per second. For applications in robotics, fast, real-time video systems are critically important and often can simplify the processing needed for certain algorithms. When combined with a high-speed projector, fast image acquisition allows 3D measurement and feature tracking to be realized.
            - superscript [ref=e888]:
              - link "[55]" [ref=e889] [cursor=pointer]:
                - /url: "#cite_note-55"
          - paragraph [ref=e890]:
            - link "Egocentric vision" [ref=e891] [cursor=pointer]:
              - /url: /wiki/Egocentric_vision
            - text: systems are composed of a wearable camera that automatically take pictures from a first-person perspective.
          - paragraph [ref=e892]:
            - text: As of 2016,
            - link "vision processing units" [ref=e893] [cursor=pointer]:
              - /url: /wiki/Vision_processing_unit
            - text: are emerging as a new class of processors to complement CPUs and
            - link "graphics processing units" [ref=e894] [cursor=pointer]:
              - /url: /wiki/Graphics_processing_units
            - text: (GPUs) in this role.
            - superscript [ref=e895]:
              - link "[56]" [ref=e896] [cursor=pointer]:
                - /url: "#cite_note-the_rise_of_VPUs-56"
          - generic [ref=e897]:
