                  - text: (1992)
              - paragraph [ref=e378]:
                - text: British designer
                - link "Alexander McQueen" [ref=e379] [cursor=pointer]:
                  - /url: /wiki/Alexander_McQueen
                - link "designed 36 womenswear collections" [ref=e381] [cursor=pointer]:
                  - /url: /wiki/List_of_Alexander_McQueen_collections
                - text: under
                - link "his eponymous fashion label" [ref=e382] [cursor=pointer]:
                  - /url: /wiki/Alexander_McQueen_(fashion_house)
                - text: during a career that lasted from 1992 until his death in 2010. As a designer, McQueen was known for sharp
                - link "tailoring" [ref=e383] [cursor=pointer]:
                  - /url: /wiki/Tailor
                - text: ","
                - link "historicism" [ref=e384] [cursor=pointer]:
                  - /url: /wiki/Historicism_(art)
                - text: ", and imaginative designs that often verged into the controversial. His"
                - link "runway shows" [ref=e385] [cursor=pointer]:
                  - /url: /wiki/Fashion_show
                - text: were known for being dramatic and theatrical, with some including elements of
                - link "performance art" [ref=e386] [cursor=pointer]:
                  - /url: /wiki/Performance_art
                - text: . Early in McQueen's career, he originated an extreme low-rise trouser cut called the "
                - link "bumster" [ref=e387] [cursor=pointer]:
                  - /url: /wiki/Low-rise_(fashion)#History
                - text: "\", which became a brand signature. Other significant designs include the skull scarf, another brand signature; the"
                - link "oyster dress" [ref=e388] [cursor=pointer]:
                  - /url: /wiki/Oyster_dress
                - text: ; and the
                - link "armadillo shoe" [ref=e389] [cursor=pointer]:
                  - /url: /wiki/Armadillo_shoe
                - text: ", worn by singer"
                - link "Lady Gaga" [ref=e390] [cursor=pointer]:
                  - /url: /wiki/Lady_Gaga
                - text: . Womenswear was the focus of McQueen's career. In his early collections, he sometimes presented menswear or had male models walk in the shows, but his label did not have a regular menswear line until 2004. (
                - link "Full list..." [ref=e392] [cursor=pointer]:
                  - /url: /wiki/List_of_Alexander_McQueen_collections
                - text: )
