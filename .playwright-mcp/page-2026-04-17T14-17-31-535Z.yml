            - generic [ref=e412]:
              - link "Priacanthus hamrur" [ref=e414] [cursor=pointer]:
                - /url: /wiki/File:Catalufa_espejuelo_(Priacanthus_hamrur),_Zanz%C3%ADbar,_Tanzania,_2024-05-31,_DD_48.jpg
                - img "Priacanthus hamrur" [ref=e415]
              - paragraph [ref=e416]:
                - link "Priacanthus hamrur" [ref=e419] [cursor=pointer]:
                  - /url: /wiki/Priacanthus_hamrur
                - text: ", commonly known as the lunar-tailed bigeye or moontail bullseye, is a species of"
                - link "marine fish" [ref=e420] [cursor=pointer]:
                  - /url: /wiki/Marine_fish
                - text: in the family
                - link "Priacanthidae" [ref=e421] [cursor=pointer]:
                  - /url: /wiki/Priacanthidae
                - text: . It is widespread but uncommon in the Indo-Pacific, ranging from the Red Sea and eastern Africa to Japan, Australia and French Polynesia, with rare records in the
                - link "Mediterranean Sea" [ref=e422] [cursor=pointer]:
                  - /url: /wiki/Mediterranean_Sea
                - text: . A
                - link "reef" [ref=e423] [cursor=pointer]:
                  - /url: /wiki/Reef
                - text: "-associated species, P. hamrur inhabits lagoons and outer reef slopes at depths of 8 to 250 metres (26 to 820 ft). It has a deep, laterally compressed body, very large red eyes, and a crescent-shaped tail. Its colour varies from silver to red, with red bands. A nocturnal feeder, its diet consists primarily of small fishes,"
                - link "crustaceans" [ref=e424] [cursor=pointer]:
                  - /url: /wiki/Crustacean
                - text: and other
                - link "invertebrates" [ref=e425] [cursor=pointer]:
                  - /url: /wiki/Invertebrate
                - text: . It may live solitarily or form schools, and is listed as a
                - link "least-concern species" [ref=e426] [cursor=pointer]:
                  - /url: /wiki/Least-concern_species
                - text: by the
                - link "International Union for Conservation of Nature" [ref=e427] [cursor=pointer]:
                  - /url: /wiki/International_Union_for_Conservation_of_Nature
                - text: . This P. hamrur fish was photographed off the coast off
                - link "Zanzibar" [ref=e428] [cursor=pointer]:
                  - /url: /wiki/Zanzibar
                - text: ", Tanzania."
