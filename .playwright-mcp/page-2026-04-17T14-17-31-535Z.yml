                - paragraph [ref=e111]:
                  - text: A
                  - link "bridge" [ref=e113] [cursor=pointer]:
                    - /url: /wiki/Bridge
                  - text: is a
                  - link "structure" [ref=e114] [cursor=pointer]:
                    - /url: /wiki/Structure#Load-bearing
                  - text: designed to span an obstacle, such as a river or valley, allowing vehicles, pedestrians, and other loads to pass across. Simple bridge structures include
                  - link "beam bridges" [ref=e115] [cursor=pointer]:
                    - /url: /wiki/Beam_bridge
                  - text: made from logs, and
                  - link "suspension bridges" [ref=e116] [cursor=pointer]:
                    - /url: /wiki/Suspension_bridge
                  - text: made of ropes or vines. The
                  - link "Romans" [ref=e117] [cursor=pointer]:
                    - /url: /wiki/Ancient_Rome
                  - text: and
                  - link "ancient Chinese" [ref=e118] [cursor=pointer]:
                    - /url: /wiki/History_of_China#Ancient_China
                  - text: built major
                  - link "arch bridges" [ref=e119] [cursor=pointer]:
                    - /url: /wiki/Arch_bridge
                  - text: (example pictured) of timber, stone, and brick. The longest spans use suspension or
                  - link "cable-stayed" [ref=e120] [cursor=pointer]:
                    - /url: /wiki/Cable-stayed_bridge
                  - text: designs.
                  - link "Bridge design" [ref=e121] [cursor=pointer]:
                    - /url: /wiki/Bridge_design
                  - text: is an important discipline within the field of
                  - link "civil engineering" [ref=e122] [cursor=pointer]:
                    - /url: /wiki/Civil_engineering
                  - text: . A bridge must be strong enough to support its own weight as well as the weight of the traffic passing over it. It must also tolerate violent, unpredictable stresses imposed by the environment, including winds, floods, and earthquakes. Many bridges are admired for their beauty, and some spectacular bridges serve as iconic landmarks that provide a sense of pride and identity for the local community. In art and literature, bridges are frequently used as metaphors to represent connection or transition.
