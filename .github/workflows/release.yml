name: release

# Tag-triggered PyPI publish via Trusted Publishing (OIDC).
# No PYPI_API_TOKEN secret required — PyPI trusts this workflow directly,
# scoped to this exact repo + branch + workflow filename.
#
# Status (2026-04-25): Trusted publisher NOT YET configured on PyPI. Until
# then, releases happen via manual `twine upload` from the laptop and this
# workflow's publish-pypi job is gated to the public repo only (so private
# tag pushes don't go red on `invalid-publisher`). When you're ready to
# arm OIDC publishing:
#   1. Log into https://pypi.org/manage/project/deltavision/settings/publishing/
#   2. Add a "GitHub" trusted publisher:
#        owner:       ddavidgao
#        repo:        deltavision   ← public repo, NOT deltavision-private
#        workflow:    release.yml
#        environment: pypi
#   3. In the PUBLIC repo's Settings → Environments, create an env named `pypi`.
#      (Optional: add branch protection / required reviewers for extra safety.)
#   4. Push a tag: tags trigger the public mirror's release workflow, which
#      runs build → publish-pypi → github-release.
#
# See: https://docs.pypi.org/trusted-publishers/adding-a-publisher/

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --wheel --sdist

      - name: Validate
        run: twine check dist/*

      - name: Fresh-venv install sanity check
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/pip install dist/*.whl
          cd /tmp
          /tmp/fresh/bin/python -c "
          from observer import DeltaVisionObserver
          from vision.elements import extract_page_state
          import server, agent, model, observation, vision, safety, config, main
          print('release candidate installs cleanly')
          "

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    # Only the public mirror has the PyPI Trusted Publisher configured (the
    # private repo's `sub` claim doesn't match anything on pypi.org). Skipping
    # this job on the private repo prevents every tag push there from going
    # red on `invalid-publisher`.
    if: github.repository == 'ddavidgao/deltavision'
    runs-on: ubuntu-latest
    environment: pypi   # gates on environment protection rules if set
    permissions:
      id-token: write   # required for OIDC → PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` — OIDC handles auth.

  github-release:
    needs: publish-pypi
    # github-release follows publish-pypi, so it only fires on the public repo.
    # Same gate, kept explicit so a failed public-only `needs` doesn't pin
    # this on the private mirror via `always()`-like fallback.
    if: github.repository == 'ddavidgao/deltavision'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for release notes

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Installed via `pip install deltavision==${{ github.ref_name }}`.

            Full changelog below (auto-generated from commits since previous tag).
