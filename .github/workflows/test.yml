name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref. Saves
# minutes (not that it costs anything on a public repo, but it's polite).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip on the private source-of-truth repo. Private-repo Actions minutes
    # count against the 2000/month free quota; public-repo minutes are free
    # and unlimited. The public mirror runs the exact same workflow on every
    # sync, so coverage is identical — we just stop double-billing the same
    # commit on private. Flip back to no-gate when minutes refresh next month
    # if you want pre-sync drift detection.
    if: github.repository == 'ddavidgao/deltavision'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install (with dev + model backends)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[claude,openai,ollama,dev]'

      - name: Lint
        run: ruff check .

      - name: Run offline test suite
        # Skip Playwright-backed tests in CI matrix — they're covered by
        # benchmark-reproducibility.yml on a single runner.
        run: pytest tests/ --ignore=tests/test_live_capture.py --ignore=tests/test_e2e_live.py -q
