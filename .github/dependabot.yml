# Dependabot: free automated dependency updates.
# Weekly PRs with minor/patch grouped together to avoid PR spam.
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch bumps into one PR so we don't drown in noise.
      # Majors still get their own PR for explicit review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python

  # GitHub Actions themselves
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
