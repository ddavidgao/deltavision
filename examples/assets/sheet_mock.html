<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Apartment Comparison — Untitled Sheet</title>
<style>
  :root {
    --bg: #f9fbfd;
    --fg: #202124;
    --muted: #5f6368;
    --grid: #dadce0;
    --header: #e8eaed;
    --active: #1a73e8;
    --active-bg: #e8f0fe;
    --toolbar: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* Title bar */
  .titlebar {
    height: 36px;
    background: var(--bg);
    border-bottom: 1px solid var(--grid);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    font-size: 14px;
  }
  .titlebar .doc {
    font-size: 16px;
    font-weight: 500;
  }
  .titlebar .star {
    color: var(--muted);
    font-size: 18px;
  }
  .titlebar .status {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }
  /* Toolbar */
  .toolbar {
    height: 44px;
    background: var(--toolbar);
    border-bottom: 1px solid var(--grid);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 14px;
  }
  .btn {
    padding: 6px 10px;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .btn:hover { background: #f1f3f4; }
  .tool-sep {
    width: 1px;
    height: 24px;
    background: var(--grid);
  }
  /* Column header row (A B C D E F ...) */
  .colheader {
    height: 24px;
    display: grid;
    grid-template-columns: 40px repeat(6, 1fr);
    border-bottom: 1px solid var(--grid);
    background: var(--header);
    font-size: 12px;
    color: var(--muted);
  }
  .colheader > div {
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--grid);
  }
  /* Rows */
  .grid {
    flex: 1;
    overflow: auto;
    background: white;
  }
  .row {
    display: grid;
    grid-template-columns: 40px repeat(6, 1fr);
    height: 32px;
    border-bottom: 1px solid var(--grid);
  }
  .row .idx {
    background: var(--header);
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--grid);
  }
  .cell {
    border-right: 1px solid var(--grid);
    padding: 0;
  }
  .cell input {
    width: 100%;
    height: 100%;
    border: none;
    padding: 0 6px;
    font: 14px inherit;
    background: transparent;
    color: var(--fg);
    outline: none;
  }
  .cell input:focus {
    outline: 2px solid var(--active);
    background: var(--active-bg);
  }
</style>
</head>
<body>
  <div class="titlebar">
    <span class="doc">Apartment Comparison</span>
    <span class="star">☆</span>
    <span class="status">All changes saved</span>
  </div>
  <div class="toolbar">
    <span class="btn">File</span>
    <span class="btn">Edit</span>
    <span class="btn">View</span>
    <span class="btn">Insert</span>
    <span class="btn">Format</span>
    <span class="btn">Data</span>
    <span class="tool-sep"></span>
    <span class="btn" title="Bold"><b>B</b></span>
    <span class="btn"><i>I</i></span>
    <span class="btn" style="text-decoration:underline">U</span>
    <span class="tool-sep"></span>
    <span class="btn">$</span>
    <span class="btn">%</span>
  </div>
  <div class="colheader">
    <div></div>
    <div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div>
  </div>
  <div class="grid" id="grid"></div>
<script>
  // Build a 12-row grid of 6 editable cells each.
  const grid = document.getElementById('grid');
  const N_ROWS = 12;
  const N_COLS = 6;
  const inputs = [];
  for (let r = 0; r < N_ROWS; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    const idx = document.createElement('div');
    idx.className = 'idx';
    idx.textContent = r + 1;
    row.appendChild(idx);
    for (let c = 0; c < N_COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const input = document.createElement('input');
      input.type = 'text';
      input.dataset.row = r;
      input.dataset.col = c;
      cell.appendChild(input);
      row.appendChild(cell);
      inputs.push(input);
    }
    grid.appendChild(row);
  }
  // Tab navigation: Tab = right, Shift+Tab = left, Enter = down-and-return-to-first-col (like Sheets after Tab chain)
  document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    if (!active || active.tagName !== 'INPUT') return;
    const r = +active.dataset.row;
    const c = +active.dataset.col;
    const idx = r * N_COLS + c;
    if (e.key === 'Tab') {
      e.preventDefault();
      const next = inputs[idx + (e.shiftKey ? -1 : 1)];
      if (next) next.focus();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const next = inputs[(r + 1) * N_COLS + 0];
      if (next) next.focus();
    }
  });
  // Focus A1 on load
  inputs[0] && inputs[0].focus();
</script>
</body>
</html>
